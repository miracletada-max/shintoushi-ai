<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>心透視AI / Heart Insight AI</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{--bg:#07020d;--card:#180b28;--card2:#10061d;--gold:#d4af37;--gold2:#f4d56a;--purple:#8b35e8;--text:#f2e8ff;--dim:#aa9bc0;--red:#d6362f}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{min-height:100vh;background:radial-gradient(circle at 50% 0%,#2b0c48 0,#09030f 48%,#020104 100%);color:var(--text);font-family:'Noto Serif JP',serif;overflow-x:hidden}

body:before{content:"";position:fixed;inset:0;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:44px 44px;opacity:.16;pointer-events:none}

.wrap{position:relative;z-index:1;max-width:760px;margin:auto;padding-bottom:80px}

.lang{position:sticky;top:0;z-index:5;display:flex;gap:8px;justify-content:flex-end;padding:12px;background:linear-gradient(to bottom,rgba(7,2,13,.92),rgba(7,2,13,.25))}

.lang button{border:1px solid rgba(212,175,55,.35);background:rgba(255,255,255,.04);color:var(--dim);padding:8px 13px;border-radius:999px;font-weight:700}

.lang button.on{background:linear-gradient(135deg,#6c20b9,var(--gold));color:#fff}

.hero{text-align:center;padding:38px 20px 28px}

.badge{display:inline-block;border-radius:999px;background:linear-gradient(90deg,#8b0f16,#d04435);border:1px solid rgba(244,213,106,.5);padding:10px 28px;color:#fff;letter-spacing:5px;font-size:12px;margin-bottom:30px}

.orb{width:92px;height:92px;border-radius:50%;margin:0 auto 22px;background:radial-gradient(circle at 35% 30%,#ffd35f,#9b2df1 42%,#32124d 80%);box-shadow:0 0 55px rgba(139,53,232,.55);animation:pulse 4s infinite ease-in-out}

@keyframes pulse{50%{transform:scale(1.07)}}

h1{font-size:42px;color:var(--gold);letter-spacing:10px;text-shadow:0 0 22px rgba(212,175,55,.35)}

.tag{letter-spacing:7px;color:var(--dim);font-size:12px;margin-top:12px}

.catch{font-size:18px;line-height:2;margin-top:28px}.catch b{color:var(--gold2)}

.tabs{display:flex;gap:8px;padding:14px;overflow:auto;border-top:1px solid rgba(212,175,55,.2);border-bottom:1px solid rgba(212,175,55,.2)}

.tab{white-space:nowrap;border:1px solid rgba(212,175,55,.3);background:rgba(255,255,255,.03);color:var(--dim);padding:12px 18px;border-radius:999px;font-weight:700}

.tab.active{color:#fff;background:linear-gradient(135deg,#701fc1,#b37a17);border-color:var(--gold)}

.panel{display:none;padding:18px}.panel.active{display:block}

.card{background:linear-gradient(160deg,rgba(35,13,58,.92),rgba(12,4,22,.95));border:1px solid rgba(212,175,55,.28);border-radius:22px;padding:22px;margin-bottom:18px;box-shadow:0 0 28px rgba(0,0,0,.25)}

.card h2{text-align:center;color:var(--gold);font-size:24px;margin-bottom:18px}

label{display:block;color:var(--gold2);font-weight:700;font-size:14px;margin:16px 0 8px}

input,textarea,select{width:100%;border:1px solid rgba(212,175,55,.28);background:rgba(255,255,255,.055);color:var(--text);border-radius:14px;padding:14px;font-size:16px;font-family:'Noto Sans JP',sans-serif}

textarea{min-height:120px;resize:vertical}

button.main{width:100%;margin-top:20px;border:0;border-radius:18px;padding:18px;background:linear-gradient(135deg,#7a1cc7,#d4af37);color:white;font-size:18px;font-weight:800;letter-spacing:2px}

button.red{background:linear-gradient(135deg,#8b1117,#d6362f,#d4af37)}

.result{display:none;margin-top:18px}.result.show{display:block}

.item{border:1px solid rgba(212,175,55,.23);border-radius:18px;padding:18px;margin:14px 0;background:rgba(255,255,255,.035)}

.item h3{color:var(--gold2);font-size:16px;margin-bottom:8px}.item p{line-height:1.9;font-family:'Noto Sans JP',sans-serif}

.bar{height:10px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-top:10px}.fill{height:100%;width:0;background:linear-gradient(90deg,#9623f1,#d4af37);transition:width 1s}.fill.red{background:linear-gradient(90deg,#8b1117,#ef4444)}

.note{text-align:center;color:var(--dim);font-size:12px;line-height:1.8;margin-top:20px}

.prices{display:grid;gap:14px}.price{border:1px solid rgba(212,175,55,.3);border-radius:18px;padding:18px;background:rgba(255,255,255,.04)}.price h3{color:var(--gold2)}.money{font-size:32px;font-weight:800;margin:8px 0;color:#fff}.price p{font-family:'Noto Sans JP',sans-serif;line-height:1.8;color:#ddd}

#consent{position:fixed;inset:0;background:#05020a;z-index:20;display:flex;align-items:center;justify-content:center;padding:20px}.consentbox{max-width:440px;background:linear-gradient(160deg,#1a0b2d,#0b0611);border:1px solid var(--gold);border-radius:24px;padding:28px;text-align:center}.consentbox p{line-height:1.9;color:#d9cce8;font-family:'Noto Sans JP',sans-serif;margin:16px 0}.agree{display:flex;gap:10px;text-align:left;align-items:flex-start;margin:18px 0}.agree input{width:20px}.start:disabled{opacity:.35}

</style>

</head>
